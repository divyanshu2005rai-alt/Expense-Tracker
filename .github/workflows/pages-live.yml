name: Deploy GitHub Pages Live

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-live"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch GitHub Pages router basename
        shell: bash
        run: |
          if ! grep -q "basename={process.env.PUBLIC_URL}" expense-frontend/src/App.js; then
            perl -0pi -e 's/<Router>/<Router basename={process.env.PUBLIC_URL}>/' expense-frontend/src/App.js
          fi

      - name: Patch manifest icons for Pages
        shell: bash
        run: |
          cat > expense-frontend/public/manifest.json <<'EOF'
          {
            "short_name": "Expense",
            "name": "Expense Tracker",
            "icons": [],
            "start_url": ".",
            "display": "standalone",
            "theme_color": "#111827",
            "background_color": "#ffffff"
          }
          EOF

      - name: Install dependencies
        working-directory: expense-frontend
        run: npm install

      - name: Build site
        working-directory: expense-frontend
        env:
          CI: "false"
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: expense-frontend/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
